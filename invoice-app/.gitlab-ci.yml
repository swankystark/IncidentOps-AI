# invoice-app CI/CD Pipeline
# Maintained by: platform-team
# Last updated: 2023-12-10
#
# Pipeline stages:
#   lint   -> flake8 style checks
#   test   -> pytest unit tests (some will fail due to planted bugs)
#   build  -> artifact packaging
#
# Expected results:
#   lint:  PASS  (flake8 does not resolve imports, misses pydantic issue)
#   test:  FAIL  (bugs #1, #2, #3 surface as test failures)
#   build: PASS  (artifact upload succeeds regardless)

image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "invoice-app"

cache:
  paths:
    - .cache/pip/

stages:
  - lint
  - test
  - build

# ------------------------------------------------------------------
# LINT STAGE
# Runs flake8 across all Python source files.
# NOTE: flake8 does not execute imports, so the pydantic v2 import
# in billing/tax_engine.py passes lint even though it fails at runtime.
# ------------------------------------------------------------------
lint:flake8:
  stage: lint
  before_script:
    - pip install flake8==6.1.0 --quiet
  script:
    - echo "Running flake8 linter..."
    - flake8 invoice-app/
        --max-line-length=120
        --exclude=invoice-app/tests/
        --ignore=E501,W503
  allow_failure: false
  artifacts:
    when: always
    reports:
      junit: lint-report.xml
    expire_in: 7 days

# ------------------------------------------------------------------
# TEST STAGE
# Runs the full pytest suite.
# Expected failures (known bugs):
#   - test_tax_config_model_valid          (Bug #3: pydantic version mismatch)
#   - test_tax_config_model_invalid_rate   (Bug #3: pydantic version mismatch)
#   - test_get_rate_pre2024_uses_historical_rate     (Bug #1: FX regression)
#   - test_historical_report_usd_normalisation_pre2024 (Bug #1: FX regression)
#   - test_validate_token_deleted_user_raises_attribute_error (Bug #2: null profile)
# ------------------------------------------------------------------
test:unit:
  stage: test
  before_script:
    - pip install -r invoice-app/requirements.txt --quiet
  script:
    - echo "Running pytest..."
    - cd invoice-app && python -m pytest tests/ -v
        --tb=short
        --junitxml=../test-report.xml
  allow_failure: true  # bugs are intentional; pipeline continues to build stage
  artifacts:
    when: always
    reports:
      junit: test-report.xml
    paths:
      - test-report.xml
    expire_in: 30 days

# Separate job to surface the pydantic import failure explicitly
test:dependency-check:
  stage: test
  before_script:
    - pip install -r invoice-app/requirements.txt --quiet
  script:
    - echo "Checking for dependency compatibility issues..."
    - |
      python -c "from billing.tax_engine import TaxConfig" || (
        echo "ERROR: billing.tax_engine failed to import."
        echo "Likely cause: pydantic version mismatch (requires >=2.0, got 1.9.0)."
        echo "See requirements.txt and billing/tax_engine.py for details."
        exit 1
      )
  allow_failure: true
  needs:
    - lint:flake8

# ------------------------------------------------------------------
# BUILD STAGE
# Packages the application as a distributable artifact.
# ------------------------------------------------------------------
build:package:
  stage: build
  before_script:
    - pip install -r invoice-app/requirements.txt --quiet
  script:
    - echo "Packaging invoice-app v$(cat invoice-app/README.md | grep version || echo '1.0.0')..."
    - mkdir -p dist
    - tar -czf dist/invoice-app-$CI_COMMIT_SHORT_SHA.tar.gz invoice-app/
    - echo "Build artifact created: dist/invoice-app-$CI_COMMIT_SHORT_SHA.tar.gz"
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
    expire_in: 14 days
  needs:
    - test:unit
