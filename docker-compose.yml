services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    volumes:
      - ./incidents.json:/app/incidents.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
